name: Deploy Hexo Blog

on:
  push:
    branches:
      - source # 监听咱们的源码分支
  workflow_dispatch: # 🌟顺手加上这行，以后 Actions 页面就会出现手动运行按钮啦！

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          submodules: true # 🌟把主题子模块也拉下来

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 安装依赖
        run: npm install

      - name: 生成静态网页
        run: |
          npx hexo clean
          npx hexo generate
          ls -la public # 🌟增加一行日志，方便我们偷窥它到底生成了啥

      - name: 部署到 main 分支展示
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main
          commit_message: "Auto deploy from Qexo"
